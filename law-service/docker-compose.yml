services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: law_service
      MYSQL_USER: law
      MYSQL_PASSWORD: law
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: law
      RABBITMQ_DEFAULT_PASS: law
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mysql-data:
